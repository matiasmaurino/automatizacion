<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    h2 { margin-bottom: 4px; }
    .sub { color: #666; margin-bottom: 24px; }
    label { display: block; margin-top: 16px; font-weight: bold; }
    input { width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box; margin-top: 4px; }
    button { margin-top: 20px; padding: 12px 20px; font-size: 16px; cursor: pointer; }
    .resultado { margin-top: 20px; padding: 14px; border: 1px solid #ccc; border-radius: 6px; display: none; }
    .resultado p { margin: 4px 0; }
    .error { color: #b00020; margin-top: 12px; }
    .ok { color: #2e7d32; margin-top: 12px; }
    .lista-item { padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 8px; cursor: pointer; }
    .lista-item:hover { background: #6a0dad; }
  </style>
</head>
<body>
  <h2>Consultar Clave Fiscal ARCA, ARBA y ALAS</h2>
  <div class="sub">Ingresá tu DNI para solicitar tus claves. Te las enviaremos a la brevedad.</div>

  <label for="dni">DNI</label>
  <input type="text" id="dni" placeholder="Ej: 30123456" inputmode="numeric">
  <button id="btnBuscar" onclick="buscar()">Buscar</button>

  <div id="msgBuscar"></div>
  <div id="listaResultados"></div>

  <div class="resultado" id="resultado">
    <p><b>Nombre:</b> <span id="rNombre"></span></p>
    <p><b>CUIT:</b> <span id="rCuit"></span></p>
    <button id="btnGuardar" onclick="guardar()">Confirmar pedido</button>
    <div id="msgGuardar"></div>
  </div>

  <script>
    var clienteSeleccionado = null;

    function buscar() {
      var dni = document.getElementById('dni').value.trim();
      var msg = document.getElementById('msgBuscar');
      var lista = document.getElementById('listaResultados');
      var resultado = document.getElementById('resultado');

      msg.className = '';
      msg.textContent = 'Buscando...';
      lista.innerHTML = '';
      resultado.style.display = 'none';

      google.script.run
        .withSuccessHandler(function(resultados) {
          msg.textContent = '';
          if (!resultados || resultados.length === 0) {
            msg.className = 'error';
            msg.textContent = 'No se encontró ningún cliente con ese DNI.';
            return;
          }
          if (resultados.length === 1) {
            seleccionar(resultados[0]);
            return;
          }
          lista.innerHTML = '<p>Se encontró más de un resultado, elegí uno:</p>';
          resultados.forEach(function(r) {
            var div = document.createElement('div');
            div.className = 'lista-item';
            div.textContent = r.cliente + ' — CUIT ' + r.cuit;
            div.onclick = function() { seleccionar(r); };
            lista.appendChild(div);
          });
        })
        .withFailureHandler(function(err) {
          msg.className = 'error';
          msg.textContent = err.message || err;
        })
        .buscarClientePorDni(dni);
    }

    function seleccionar(r) {
      clienteSeleccionado = r;
      document.getElementById('listaResultados').innerHTML = '';
      document.getElementById('rNombre').textContent = r.cliente;
      document.getElementById('rCuit').textContent = r.cuit;
      document.getElementById('resultado').style.display = 'block';
      document.getElementById('msgGuardar').textContent = '';
    }

    function guardar() {
      if (!clienteSeleccionado) return;
      var msg = document.getElementById('msgGuardar');
      var btn = document.getElementById('btnGuardar');
      btn.disabled = true;
      msg.className = '';
      msg.textContent = 'Registrando pedido...';

      google.script.run
        .withSuccessHandler(function() {
          msg.className = 'ok';
          msg.textContent = '✅ Pedido registrado. Tus claves serán enviadas a la brevedad.';
          btn.disabled = false;
        })
        .withFailureHandler(function(err) {
          msg.className = 'error';
          msg.textContent = err.message || err;
          btn.disabled = false;
        })
        .registrarPedidoConsulta(clienteSeleccionado.fila);
    }
  </script>
</body>
</html>
