<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; max-width: 420px; margin: 60px auto; padding: 0 16px; text-align: center; }
    h2 { margin-bottom: 30px; }
    .opcion-btn {
      display: block; width: 100%; padding: 18px; margin-top: 16px;
      font-size: 18px; cursor: pointer; border: 1px solid #ccc; border-radius: 8px;
      background: #f8f8f8;
    }
    .opcion-btn:hover { background: #eee; }
  </style>
</head>
<body>
  <h2>¿Qué querés hacer?</h2>
  <button class="opcion-btn" onclick="ir('facturacion')">Facturar</button>
  <button class="opcion-btn" onclick="ir('opcion')">Constancia de Opción</button>

  <script>
    function ir(modulo) {
      const base = window.location.href.split('?')[0];
      window.location.href = base + '?modulo=' + modulo;
    }
  </script>
</body>
</html>
