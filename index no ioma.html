<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; overflow-x: hidden; }
    body {
      font-family: Arial, sans-serif;
      width: 100%; max-width: 440px;
      margin: 0 auto; padding: 16px 12px;
      color: #222; overflow-x: hidden;
    }
    h2 { color: #333; font-size: 20px; margin-bottom: 8px; }
    h3 { color: #333; font-size: 18px; margin: 0 0 10px; }
    .paso { display: none; width: 100%; }
    .paso.activo { display: block; }

    #bannerPaciente {
      display: none;
      background: #f5f5f5;
      border-left: 4px solid #666;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 14px;
      word-break: break-word;
      white-space: pre-line;
      line-height: 1.4;
    }

    label { display: block; margin-top: 14px; font-weight: bold; font-size: 13px; }
    input[type=text], input[type=number], select {
      display: block; width: 100%;
      padding: 10px 8px; margin-top: 4px;
      font-size: 16px; border: 1px solid #ccc; border-radius: 4px;
    }
    
    /* Nuevas clases para layout lado a lado */
    .fila-calculo { display: flex; gap: 8px; margin-top: 0; }
    .col-calculo { flex: 1; }
    .campo-deshabilitado { background-color: #f5f5f5; color: #555; cursor: not-allowed; }
    .separador-or { text-align: center; font-weight: bold; font-size: 12px; color: #777; margin: 12px 0 4px; text-transform: uppercase; }

    .botones { display: flex; gap: 8px; margin-top: 20px; }
    .btn { padding: 12px 10px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 15px; width: 100%; }
    .btn-principal { background: #f8f8f8; color: #222; flex: 2; }
    .btn-principal:hover { background: #eee; }
    .btn-volver    { background: #e0e0e0; color: #555; flex: 1; }
    .btn-volver:hover { background: #d5d5d5; }
    .btn:disabled { background: #ccc !important; color: #888; cursor: not-allowed; }

    .error { color: #c62828; margin-top: 10px; font-size: 13px; word-break: break-word; }
    .info  { background: #fafafa; border: 1px solid #ccc; padding: 10px; border-radius: 4px; margin-top: 10px; font-size: 13px; word-break: break-word; overflow-wrap: break-word; }

    .resumen-fila { padding: 5px 0; border-bottom: 1px solid #eee; font-size: 13px; }
    .resumen-fila:last-child { border-bottom: none; }
    .resumen-label { font-weight: bold; color: #333; font-size: 11px; text-transform: uppercase; }
    .resumen-valor { margin-top: 2px; }

    .importe-box { background: #444; color: white; border-radius: 6px; padding: 10px 12px; margin-top: 12px; text-align: center; }
    .importe-box .imp-label { font-size: 12px; opacity: 0.85; }
    .importe-box .imp-valor { font-size: 22px; font-weight: bold; }
  </style>
</head>
<body>
<h2>Facturación Particular - Coseguro - Empresa</h2>

<!-- Banner superior de datos -->
<div id="bannerPaciente"></div>

<!-- PASO 1 -->
<div class="paso activo" id="paso1">
  <label>Escribí tu DNI</label>
  <input type="text" id="dniCliente" placeholder="Ej: 30123456">
  <div class="error" id="error1"></div>
  <div class="botones">
    <button class="btn btn-principal" onclick="paso1_buscar()">Continuar</button>
  </div>
</div>

<!-- PASO 1b -->
<div class="paso" id="paso1b">
  <label>Encontramos varias coincidencias, elegí la tuya:</label>
  <select id="selectCliente"></select>
  <div class="botones">
    <button class="btn btn-volver" onclick="mostrarPaso(1)">Volver</button>
    <button class="btn btn-principal" onclick="paso1b_confirmar()">Continuar</button>
  </div>
</div>

<!-- PASO 3 -->
<div class="paso" id="paso3">
  <label>¿Qué prestación es?</label>
  <select id="selectServicio"></select>

  <label>Mes de la prestación</label>
  <select id="selectMes"></select>

  <label>¿A quién le facturás?</label>
  <select id="selectCuitReceptor"></select>

  <!-- Bloque de cálculo de Horas y Valores -->
  <div class="fila-calculo">
    <div class="col-calculo">
      <label>Horas trabajadas</label>
      <input type="number" id="horas" min="1" placeholder="Ej: 312" oninput="calcularTotalPaso3()">
    </div>
    <div class="col-calculo">
      <label>Valor hora ($)</label>
      <input type="number" id="valorHoraManual" min="0" placeholder="Ej: 1887" oninput="calcularTotalPaso3()">
    </div>
    <div class="col-calculo">
      <label>Total ($)</label>
      <input type="text" id="totalCalculado" class="campo-deshabilitado" readonly placeholder="0">
    </div>
  </div>

  <div class="separador-or">— Ó BIEN —</div>

  <!-- Bloque de Importe Total Directo -->
  <label>Ingresar Importe Total Directo</label>
  <input type="number" id="importeTotalDirecto" min="0" placeholder="Ej: 588744" oninput="limpiarBloqueHoras()">

  <div class="error" id="error3"></div>
  <div class="botones">
    <button class="btn btn-volver" onclick="mostrarPaso(1)">Volver</button>
    <button class="btn btn-principal" onclick="paso3_continuar()">Continuar</button>
  </div>
</div>

<!-- PASO 5 -->
<div class="paso" id="paso5">
  <h3 style="color:#333; margin:0 0 10px">Confirmá los datos</h3>
  <div id="resumenFinal"></div>
  <div class="error" id="error5"></div>
  <div class="botones">
    <button class="btn btn-volver" id="btnVolver5" onclick="mostrarPaso(3)">Volver</button>
    <button class="btn btn-principal" id="btnEnviar" onclick="enviar()">Confirmar y enviar</button>
  </div>
</div>

<!-- PASO 6 -->
<div class="paso" id="paso6">
  <h3>¡Listo,tomamos nota de tu pedido y te vamos a enviar la factura al correo electronico que tenemos registrado!</h3>
  <div id="resumenOk"></div>
</div>

<script>
  const estado = {
    candidatosCliente: [],
    cliente: null,
    servicio: null,
    mesNumero: null,
    anio: null,
    horas: 0,
    valorHora: 0,
    importeTotal: 0,
    cuitReceptor: null,
    modoFacturacion: 'horas' // 'horas' o 'directo'
  };

  function mostrarPaso(n) {
    document.querySelectorAll('.paso').forEach(p => p.classList.remove('activo'));
    document.getElementById('paso' + n).classList.add('activo');
    
    const banner = document.getElementById('bannerPaciente');
    if (n == 3 && estado.cliente) {
      banner.style.display = 'block';
    } else {
      banner.style.display = 'none';
    }
    window.scrollTo(0, 0);
  }

  function actualizarBanner() {
    if (!estado.cliente) return;
    document.getElementById('bannerPaciente').style.display = 'block';
    document.getElementById('bannerPaciente').textContent =
      '💼 Cliente: ' + estado.cliente.cliente + ' — CUIT ' + estado.cliente.cuit;
  }

  function calcularTotalPaso3() {
    const horas = parseFloat(document.getElementById('horas').value) || 0;
    const valor = parseFloat(document.getElementById('valorHoraManual').value) || 0;
    
    if (horas > 0 || valor > 0) {
      document.getElementById('importeTotalDirecto').value = ''; // Limpia el directo
      const total = horas * valor;
      document.getElementById('totalCalculado').value = total > 0 ? total.toFixed(2) : '0';
    } else {
      document.getElementById('totalCalculado').value = '0';
    }
  }

  function limpiarBloqueHoras() {
    const directo = document.getElementById('importeTotalDirecto').value;
    if (directo) {
      document.getElementById('horas').value = '';
      document.getElementById('valorHoraManual').value = '';
      document.getElementById('totalCalculado').value = '0';
    }
  }

  function paso1_buscar() {
    const dni = document.getElementById('dniCliente').value.trim();
    document.getElementById('error1').textContent = '';
    if (!dni) { document.getElementById('error1').textContent = 'Ingresá tu DNI.'; return; }
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || res.length === 0) {
          document.getElementById('error1').textContent = 'No encontramos ese DNI. Revisalo e intentá de nuevo.';
          return;
        }
        estado.candidatosCliente = res;
        if (res.length === 1) {
          estado.cliente = res[0];
          irAPaso3Directo();
        } else {
          const sel = document.getElementById('selectCliente');
          sel.innerHTML = '';
          res.forEach((c, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = c.cliente + ' (CUIT ' + c.cuit + ')';
            sel.appendChild(opt);
          });
          mostrarPaso('1b');
        }
      })
      .withFailureHandler(function(err) {
        document.getElementById('error1').textContent = err.message || err;
      })
      .buscarClientePorDni(dni);
  }

  function paso1b_confirmar() {
    const idx = document.getElementById('selectCliente').value;
    estado.cliente = estado.candidatosCliente[Number(idx)];
    irAPaso3Directo();
  }

  function irAPaso3Directo() {
    actualizarBanner();
    
    google.script.run
      .withSuccessHandler(function(listaServicios) {
        const sel = document.getElementById('selectServicio');
        sel.innerHTML = '';
        listaServicios.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s; opt.textContent = s;
          sel.appendChild(opt);
        });
        estado.servicio = sel.value;
      })
      .listarServiciosClienteNoIoma(estado.cliente.fila);

    cargarMeses();
    
    google.script.run
      .withSuccessHandler(function(listaCuits) {
        const sel = document.getElementById('selectCuitReceptor');
        sel.innerHTML = '';
        listaCuits.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c;
          opt.textContent = c === '30628249527' ? 'IOMA (30628249527)' : c;
          sel.appendChild(opt);
        });
        estado.cuitReceptor = sel.value;
      })
      .listarCuitsReceptorClienteNoIoma(estado.cliente.fila);

    mostrarPaso(3);
  }

  function cargarMeses() {
    const sel = document.getElementById('selectMes');
    sel.innerHTML = '';
    const nombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const hoy = new Date();
    for (let i = 18; i >= -3; i--) {
      const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
      const opt = document.createElement('option');
      opt.value = (d.getMonth() + 1) + '-' + d.getFullYear();
      opt.textContent = nombres[d.getMonth()] + ' ' + d.getFullYear();
      sel.appendChild(opt);
    }
    sel.selectedIndex = sel.options.length - 4;
  }

  function paso3_continuar() {
    document.getElementById('error3').textContent = '';
    const [mes, anio] = document.getElementById('selectMes').value.split('-');
    
    const hInput = document.getElementById('horas').value;
    const vInput = document.getElementById('valorHoraManual').value;
    const directInput = document.getElementById('importeTotalDirecto').value;

    estado.servicio = document.getElementById('selectServicio').value;
    estado.cuitReceptor = document.getElementById('selectCuitReceptor').value;
    estado.mesNumero = Number(mes);
    estado.anio = Number(anio);

    // Validación cruzada
    if (directInput) {
      estado.modoFacturacion = 'directo';
      estado.importeTotal = parseFloat(directInput);
      estado.horas = 0;
      estado.valorHora = 0;
      if (estado.importeTotal <= 0) {
        document.getElementById('error3').textContent = 'El importe total ingresado debe ser mayor a cero.'; return;
      }
    } else {
      estado.modoFacturacion = 'horas';
      estado.horas = parseFloat(hInput) || 0;
      estado.valorHora = parseFloat(vInput) || 0;
      estado.importeTotal = estado.horas * estado.valorHora;
      if (estado.horas <= 0 || estado.valorHora <= 0) {
        document.getElementById('error3').textContent = 'Por favor complete la cantidad de horas y el valor por hora, o bien ingrese un Importe Total Directo.'; return;
      }
    }

    armarResumen();
    mostrarPaso(5);
  }

  function armarResumen() {
    const nombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    
    const filas = [
      ['Cliente',      estado.cliente.cliente],
      ['CUIT',         estado.cliente.cuit],
      ['Prestación',   estado.servicio],
      ['Período',      nombres[estado.mesNumero-1] + ' ' + estado.anio]
    ];

    if (estado.modoFacturacion === 'horas') {
      filas.push(['Horas', estado.horas]);
      filas.push(['Valor de la hora', '$' + estado.valorHora]);
    }

    filas.push(['Se factura a', estado.cuitReceptor === '30628249527' ? 'IOMA (30628249527)' : estado.cuitReceptor]);
    
    const html = filas.map(f =>
      '<div class="resumen-fila"><div class="resumen-label">' + f[0] + '</div><div class="resumen-valor">' + f[1] + '</div></div>'
    ).join('');
    document.getElementById('resumenFinal').innerHTML = '<div class="info" style="padding:0;overflow:hidden">' + html + '</div>';
  }

  function enviar() {
    document.getElementById('error5').textContent = '';
    document.getElementById('btnEnviar').disabled = true;
    
    const payload = {
      cuit:            estado.cliente.cuit,
      claveAfip:       estado.cliente.claveAfip,
      clienteNombre:   estado.cliente.cliente,
      pacienteNombre:  '',
      numeroAfiliado:  '',
      estado:          '',
      dniPaciente:     '',
      numeroTramite:   '',
      servicio:        estado.servicio,
      mesNumero:       estado.mesNumero,
      anio:            estado.anio,
      horas:           estado.horas,
      valorHoraManual: estado.valorHora,
      importeTotal:    estado.importeTotal,
      cuitReceptor:    estado.cuitReceptor,
      modoFacturacion: estado.modoFacturacion,
      retroactivo:     false
    };
    
    google.script.run
      .withSuccessHandler(function(res) {
        const impFormateado = Number(estado.importeTotal).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        
        // Renderizado Final sin el cuadro de resolución de acuerdo a la imagen provista
        let subcuadroHtml = '';
        if (estado.modoFacturacion === 'horas') {
          subcuadroHtml = 
            '<div class="info" style="margin-top:10px">' +
              '<div class="resumen-fila"><div class="resumen-label">Valor de la hora</div><div class="resumen-valor">$' + estado.valorHora + '</div></div>' +
            '</div>';
        }

        document.getElementById('resumenOk').innerHTML =
          document.getElementById('resumenFinal').innerHTML +
          subcuadroHtml +
          '<div class="importe-box">' +
            '<div class="imp-label">Importe facturado</div>' +
            '<div class="imp-valor">$ ' + impFormateado + '</div>' +
          '</div>';
        mostrarPaso(6);
      })
      .withFailureHandler(function(err) {
        document.getElementById('error5').textContent = err.message || err;
        document.getElementById('btnEnviar').disabled = false;
      })
      .guardarFacturaNoIoma(payload);
  }
</script>
</body>
</html>
